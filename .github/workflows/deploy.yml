name: Docker Deploy LabMate

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_DNS }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Fix: Use $HOME instead of ~ for the directory check
            if [ ! -d "$HOME/LabMate" ]; then
              git clone https://github.com/sushantrajput/LabMate.git $HOME/LabMate
            fi
            
            cd $HOME/LabMate
            
            # Pull latest changes
            git pull origin main
            
            # Fix: Ensure a dummy .env exists to prevent Docker Compose from crashing
            # (You should still manually add your real keys to this file via SSH)
            touch server/.env
            
            # Docker commands
            docker compose down
            docker system prune -f
            docker compose up --build -d